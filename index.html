<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1817 Payout Calculator</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>1817 Payout Calculator</h1>
      <div class="inputs">
        <div class="input-group">
          <span class="input-group__label">Revenue</span>
          <label>
            Revenue ($)
            <input id="revenue" type="number" min="0" step="10" value="0" />
          </label>
          <label>
            Shares
            <select id="shares">
              <option value="10" selected>10</option>
              <option value="5">5</option>
              <option value="2">2</option>
            </select>
          </label>
          <label id="treasury-label">
            Treasury shares
            <input id="treasury" type="number" min="0" max="18" step="1" value="0" />
          </label>
        </div>
        <div class="input-group">
          <span class="input-group__label">Loans</span>
          <label>
            Company cash ($)
            <input id="cash" type="number" min="0" value="0" />
          </label>
          <label>
            Loans
            <input id="loans" type="number" min="0" max="10" step="1" value="0" />
          </label>
          <label>
            Interest rate
            <select id="rate">
              <option value="5">$5</option>
              <option value="10">$10</option>
              <option value="15">$15</option>
              <option value="20">$20</option>
              <option value="25">$25</option>
              <option value="30">$30</option>
              <option value="35">$35</option>
              <option value="40">$40</option>
              <option value="45">$45</option>
              <option value="50">$50</option>
              <option value="55">$55</option>
              <option value="60">$60</option>
              <option value="65">$65</option>
              <option value="70">$70</option>
            </select>
          </label>
        </div>
      </div>
      <div class="dj-input">
        <span class="input-group__label">Double Jump</span>
        <label>
          Stock price ($)
          <select id="price">
            <option value="0">—</option>
            <option value="40">$40</option>
            <option value="45">$45</option>
            <option value="50">$50</option>
            <option value="55">$55</option>
            <option value="60">$60</option>
            <option value="65">$65</option>
            <option value="70">$70</option>
            <option value="80">$80</option>
            <option value="90">$90</option>
            <option value="100">$100</option>
            <option value="110">$110</option>
            <option value="120">$120</option>
            <option value="135">$135</option>
            <option value="150">$150</option>
            <option value="165">$165</option>
            <option value="180">$180</option>
            <option value="200">$200</option>
            <option value="220">$220</option>
            <option value="245">$245</option>
            <option value="270">$270</option>
            <option value="300">$300</option>
            <option value="330">$330</option>
            <option value="360">$360</option>
            <option value="400">$400</option>
            <option value="440">$440</option>
            <option value="490">$490</option>
            <option value="540">$540</option>
            <option value="600">$600</option>
          </select>
        </label>
      </div>
      <div class="results" aria-live="polite" aria-atomic="true">
        <div class="result result--full">
          <span class="result__label">Full Pay</span>
          <div class="result__right">
            <span class="result__value" id="result-full">—</span>
            <div class="result__breakdown" id="result-full-breakdown"></div>
          </div>
        </div>
        <div class="result result--half">
          <span class="result__label">Half Pay</span>
          <div class="result__right">
            <span class="result__value" id="result-half">—</span>
            <div class="result__breakdown" id="result-half-breakdown"></div>
          </div>
        </div>
        <div class="result result--withhold">
          <span class="result__label">Withhold</span>
          <div class="result__right">
            <span class="result__value" id="result-withhold">—</span>
            <div class="result__breakdown" id="result-withhold-breakdown"></div>
          </div>
        </div>
      </div>
      <div id="double-jump"></div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
